<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modem Optique - Sensor Edition</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #00ccff; text-align: center; padding: 20px; }
        .card { border: 1px solid #004466; padding: 20px; border-radius: 15px; background: #050505; margin-bottom: 20px; }
        textarea { width: 100%; height: 60px; background: #000; color: #00ccff; border: 1px solid #004466; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: #001122; color: #00ccff; border: 1px solid #00ccff; cursor: pointer; font-weight: bold; }
        button:hover { background: #00ccff; color: #000; }
        #receivedText { font-size: 1.8em; color: #fff; margin-top: 20px; min-height: 50px; border: 1px dashed #00ccff; padding: 10px; }
        .sensor-val { font-size: 0.7em; color: #444; margin-top: 5px; }
        #light-indicator { width: 50px; height: 50px; border-radius: 50%; background: #111; margin: 10px auto; border: 2px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔦 ÉMETTEUR (FLASH)</h2>
        <textarea id="textToSend">NILS</textarea>
        <button onclick="sendFlash()">ENVOYER LE SIGNAL</button>
    </div>

    <div class="card">
        <h2>📡 RÉCEPTEUR (CAPTEUR)</h2>
        <div id="light-indicator"></div>
        <div class="sensor-val">LUMIÈRE : <span id="lux">0</span></div>
        <button onclick="startSensor()">ACTIVER CAPTEUR DE LUMINOSITÉ</button>
        <div id="receivedText">_</div>
    </div>

<script>
    const BIT_TIME = 100; // Très rapide car le capteur est réactif

    // --- ÉMETTEUR ---
    async function sendFlash() {
        const text = document.getElementById('textToSend').value;
        let binary = "";
        for (let char of text) binary += "1" + char.charCodeAt(0).toString(2).padStart(8, '0');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const track = stream.getVideoTracks()[0];
            
            for (let bit of binary) {
                await track.applyConstraints({ advanced: [{ torch: (bit === "1") }] });
                await new Promise(r => setTimeout(r, BIT_TIME));
            }
            await track.applyConstraints({ advanced: [{ torch: false }] });
            track.stop();
        } catch (e) { alert("Flash non supporté sur cet appareil."); }
    }

    // --- RÉCEPTEUR ---
    function startSensor() {
        const luxDisplay = document.getElementById('lux');
        const indicator = document.getElementById('light-indicator');
        const output = document.getElementById('receivedText');
        
        let bitBuffer = "";

        // On vérifie si l'API Generic Sensor est disponible
        if ('AmbientLightSensor' in window) {
            try {
                const sensor = new AmbientLightSensor();
                sensor.addEventListener('reading', () => {
                    const lux = sensor.illuminance;
                    luxDisplay.innerText = lux;
                    
                    // Détection du bit
                    const val = (lux > 100) ? "1" : "0"; // Seuil à ajuster selon la pièce
                    indicator.style.backgroundColor = (val === "1") ? "#fff" : "#111";
                    
                    // On enregistre à intervalle fixe
                    // Note: Le capteur est plus précis avec un échantillonnage temporel
                });
                sensor.start();
            } catch (e) {
                alert("Accès capteur bloqué. Utilisation de la méthode Caméra-Capteur.");
            }
        } else {
            // Méthode alternative pour iPhone (utilisation du flux vidéo mais analyse d'un seul pixel central)
            alert("L'iPhone bloque l'accès direct au capteur Lux. On utilise l'objectif frontal comme capteur de précision.");
            useCameraAsSensor();
        }
    }

    async function useCameraAsSensor() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 10; canvas.height = 10; // On réduit au max pour la vitesse

        let bitBuffer = "";

        setInterval(() => {
            ctx.drawImage(video, 0, 0, 10, 10);
            const d = ctx.getImageData(0, 0, 10, 10).data;
            let brightness = 0;
            for (let i = 0; i < d.length; i += 4) brightness += (d[i] + d[i+1] + d[i+2]) / 3;
            let avg = brightness / (d.length / 4);

            let bit = (avg > 150) ? "1" : "0";
            document.getElementById('light-indicator').style.backgroundColor = (bit === "1") ? "#fff" : "#111";
            bitBuffer += bit;

            if (bitBuffer.length >= 9) {
                let text = "";
                for(let i=0; i <= bitBuffer.length - 9; i++) {
                    if (bitBuffer[i] === "1") {
                        let byte = bitBuffer.substr(i + 1, 8);
                        text += String.fromCharCode(parseInt(byte, 2));
                        i += 8;
                    }
                }
                if (text.length > 0) document.getElementById('receivedText').innerText = text;
            }
        }, BIT_TIME);
    }
</script>
</body>
</html>
